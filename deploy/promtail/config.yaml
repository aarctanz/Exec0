server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only collect logs from exec0 app containers
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*exec0-(api|worker).*"
        action: keep
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: container
    pipeline_stages:
      # Parse JSON logs (production format from zerolog)
      - json:
          expressions:
            level: level
            trace_id: trace_id
            message: message
      - labels:
          level:
          trace_id:
