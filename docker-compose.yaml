services:
  # --- Infrastructure ---
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/migrations:ro
      - ./deploy/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # --- Application ---
  exec0-api:
    build:
      context: .
      target: api
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  exec0-worker:
    build:
      context: .
      target: worker
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "${WORKER_METRICS_PORT:-9091}:${WORKER_METRICS_PORT:-9091}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Observability ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    volumes:
      - ./deploy/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  tempo:
    image: grafana/tempo:2.7.2
    volumes:
      - ./deploy/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempodata:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.4.3
    volumes:
      - ./deploy/loki/config.yaml:/etc/loki/config.yaml:ro
      - lokidata:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.3
    volumes:
      - ./deploy/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./deploy/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.5.2
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"

volumes:
  pgdata:
  tempodata:
  lokidata:
  promdata:
  grafanadata:
