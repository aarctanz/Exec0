services:
  postgres:
    image: postgres:18.3-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./database/migrations:/migrations:ro
      - ./deploy/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - core

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - core

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_ADDRESS: redis:6379
      OTEL_ENDPOINT: otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    networks:
      - core
      - observability

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    privileged: true
    cgroup: host
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_ADDRESS: redis:6379
      OTEL_ENDPOINT: otel-collector:4317
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - core
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    restart: unless-stopped
    volumes:
      - ./deploy/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    volumes:
      - ./deploy/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempodata:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    networks:
      - observability

  loki:
    image: grafana/loki:3.4.3
    restart: unless-stopped
    volumes:
      - ./deploy/loki/config.yaml:/etc/loki/config.yaml:ro
      - lokidata:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    networks:
      - observability

  promtail:
    image: grafana/promtail:3.4.3
    restart: unless-stopped
    volumes:
      - ./deploy/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on:
      - loki
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability

volumes:
  pgdata:
  tempodata:
  lokidata:
  promdata:
  grafanadata:

networks:
  core:
    driver: bridge
  observability:
    driver: bridge
